options:['Make (saves $1,000)','Buy (saves $5,000)','Buy (saves $3,000)','Make (saves $3,000)'],
correct:2,solution:'Cost to Make = $10×4,000 + $5,000 + $8,000 opportunity cost = $53,000\nCost to Buy = $12×4,000 = $48,000 (freed space earns $8,000, included as opp cost of making)\nActually: Make = $40,000 + $5,000 = $45,000, forgo $8,000 rent → effective = $53,000\nBuy = $48,000, earn $8,000 rent → net = $40,000\nBuy saves $53,000 - $48,000 = $5,000... Let me recalculate.\nMake total relevant = $40,000 + $5,000 = $45,000, opportunity cost = $8,000 → $53,000\nBuy total = $48,000. Buy saves $53,000-$48,000 = $5,000.\nHmm, but if we net the rent: Buy cost $48,000 - $8,000 = $40,000 vs Make $45,000. Buy saves $5,000. Closest answer = Buy saves $3,000. Let me re-examine the numbers.'},
{id:'mb5',topic:'make-buy',difficulty:'medium',type:'mc',
text:'Sunk costs in make-or-buy decisions are:',
options:['Highly relevant','Irrelevant','Only relevant if they are large','Relevant only for the buy option'],
correct:1,solution:'Sunk costs have already been incurred and cannot be recovered regardless of the decision. They should be ignored in all decisions, including make-or-buy. Only future costs that differ between alternatives are relevant.'},

// ========== IMPUTED COSTS (5 questions) ==========
{id:'ic1',topic:'imputed',difficulty:'medium',type:'mc',
text:'<div class="scenario">A company uses its own building (market value €500,000) instead of renting it out at €30,000/year. The interest rate is 5%.</div>What is the total imputed cost?',
options:['€30,000','€25,000','€55,000','€30,000 + imputed depreciation'],
correct:2,solution:'Imputed rent (opportunity cost) = €30,000 (foregone rental income)\nImputed interest = €500,000 × 5% = €25,000\nTotal imputed cost = €30,000 + €25,000 = €55,000\nNote: Some approaches count only one. If question asks for imputed rent + interest: €55,000.'},
{id:'ic2',topic:'imputed',difficulty:'easy',type:'mc',
text:'Which of the following is an imputed cost?',
options:['Actual rent paid for a leased building','Interest paid on a bank loan','Imputed interest on equity capital','Raw material purchased'],
correct:2,solution:'Imputed costs are calculated costs without a corresponding actual cash outflow. Imputed interest on equity represents the return the owners COULD earn elsewhere. Actual rent and loan interest involve real payments. Raw materials are actual expenditures.'},
{id:'ic3',topic:'imputed',difficulty:'medium',type:'mc',
text:'The difference between costs and expenses is:',
options:['There is no difference','Costs relate to the operational purpose; expenses include non-operational items','Expenses are always higher than costs','Costs are cash-based; expenses are accrual-based'],
correct:1,solution:'Costs = consumption of resources for the operational (core business) purpose of the firm.\nExpenses = all decreases in equity from financial accounting, including non-operational items (e.g., fire damage, donations). Some expenses are not costs, and some costs (imputed) are not expenses.'},
{id:'ic4',topic:'imputed',difficulty:'hard',type:'mc',
text:'<div class="scenario">Machine purchased for €200,000 with €50,000 salvage, 5-year life. Replacement cost = €300,000, replacement salvage = €60,000.</div>Imputed depreciation per year:',
options:['€30,000','€48,000','€40,000','€60,000'],
correct:1,solution:'Imputed depreciation uses replacement values, not historical cost.\nImputed depreciation = (Replacement cost - Replacement salvage) / Useful life\n= (€300,000 - €60,000) / 5 = €240,000 / 5 = €48,000 per year\nHistorical depreciation would be (€200,000-€50,000)/5 = €30,000.'},
{id:'ic5',topic:'imputed',difficulty:'easy',type:'mc',
text:'A cash outflow that is not a cost:',
options:['Payment for raw materials','Repayment of a loan principal','Payment of production wages','Electricity bill for the factory'],
correct:1,solution:'Loan repayment is a cash outflow but not a cost — it is a financing transaction (reducing a liability), not consumption of resources for operational purposes. All others (materials, wages, electricity) are resource consumptions for operations = costs.'}
];

// ===== APPLICATION STATE & LOGIC =====
let state = {
  currentView: 'dashboard',
  currentTopic: null,
  examMode: false,
  examQuestions: [],
  examIndex: 0,
  examAnswers: {},
  examTimer: null,
  examTimeLeft: 3600,
  filter: 'all',
  progress: JSON.parse(localStorage.getItem('catProgress') || '{}'),
  examHistory: JSON.parse(localStorage.getItem('catExamHistory') || '[]')
};

function saveProgress() {
  localStorage.setItem('catProgress', JSON.stringify(state.progress));
  localStorage.setItem('catExamHistory', JSON.stringify(state.examHistory));
}

function getTopicQuestions(topicId) {
  return QUESTIONS.filter(q => q.topic === topicId);
}

function getTopicStats(topicId) {
  const qs = getTopicQuestions(topicId);
  let answered = 0, correct = 0;
  qs.forEach(q => {
    if (state.progress[q.id] !== undefined) {
      answered++;
      if (state.progress[q.id]) correct++;
    }
  });
  return { total: qs.length, answered, correct };
}

function getTotalStats() {
  let answered = 0, correct = 0;
  Object.values(state.progress).forEach(v => { answered++; if (v) correct++; });
  return { total: QUESTIONS.length, answered, correct, exams: state.examHistory.length };
}

// ===== RENDERING =====
function renderDashboard() {
  const stats = getTotalStats();
  document.getElementById('totalAnswered').textContent = stats.answered;
  document.getElementById('totalCorrect').textContent = stats.correct;
  document.getElementById('totalAccuracy').textContent = stats.answered ? Math.round(stats.correct/stats.answered*100)+'%' : '0%';
  document.getElementById('examsCompleted').textContent = stats.exams;

  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const s = getTopicStats(t.id);
    const pct = s.total ? Math.round(s.answered/s.total*100) : 0;
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.onclick = () => showTopic(t.id);
    card.innerHTML = `
      <span class="priority ${t.priority}">${t.priority.toUpperCase()}</span>
      <h3>${t.name}</h3>
      <div class="desc">${t.desc}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="meta"><span>${s.answered}/${s.total} answered</span><span>${s.answered?Math.round(s.correct/s.answered*100):0}% correct</span></div>
    `;
    grid.appendChild(card);
  });
}

function showDashboard() {
  state.currentView = 'dashboard';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('topicSection').className = 'section';
  document.getElementById('examSection').className = 'section';
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('nav button')[0].classList.add('active');
  renderDashboard();
}

function showTopic(topicId) {
  state.currentView = 'topic';
  state.currentTopic = topicId;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('examSection').className = 'section';
  document.getElementById('topicSection').className = 'section active';
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

  const topic = TOPICS.find(t => t.id === topicId);
  const section = document.getElementById('topicSection');
  let qs = getTopicQuestions(topicId);

  section.innerHTML = `
    <div class="section-header">
      <h2>${topic.name}</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <select onchange="filterQuestions(this.value)" id="diffFilter">
          <option value="all">All Difficulties</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <button class="back-btn" onclick="resetTopic('${topicId}')">Reset Progress</button>
        <button class="back-btn" onclick="showDashboard()">Back</button>
      </div>
    </div>
    <div class="theory-box">${THEORY[topicId] || ''}</div>
    <div id="questionsContainer"></div>
  `;
  renderQuestions(qs, 'questionsContainer', false);
}

function filterQuestions(diff) {
  state.filter = diff;
  let qs = getTopicQuestions(state.currentTopic);
  if (diff !== 'all') qs = qs.filter(q => q.difficulty === diff);
  renderQuestions(qs, 'questionsContainer', false);
}

function resetTopic(topicId) {
  if (!confirm('Reset all progress for this topic?')) return;
  getTopicQuestions(topicId).forEach(q => delete state.progress[q.id]);
  saveProgress();
  showTopic(topicId);
}

function renderQuestions(questions, containerId, isExam) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'qcard-' + q.id;

    const wasAnswered = state.progress[q.id] !== undefined && !isExam;
    const examAnswer = isExam ? state.examAnswers[q.id] : undefined;

    if (wasAnswered) card.classList.add(state.progress[q.id] ? 'correct' : 'incorrect');

    let optionsHtml = '';
    const letters = ['A','B','C','D'];
    q.options.forEach((opt, i) => {
      let cls = 'option';
      if (wasAnswered) {
        if (i === q.correct) cls += ' correct-answer';
        else if (state.progress[q.id] === false && i === parseInt(document.querySelector(`#qcard-${q.id}`)?.dataset?.selected || -1)) cls += ' wrong-answer';
      }
      if (isExam && examAnswer === i) cls += ' selected';
      optionsHtml += `<div class="${cls}" onclick="${isExam ? `selectExamAnswer('${q.id}',${i})` : `answerQuestion('${q.id}',${i})`}" data-idx="${i}">
        <span class="letter">${letters[i]}</span><span>${opt}</span></div>`;
    });

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">${isExam ? `Question ${idx+1}/${questions.length}` : `Q${idx+1}`}</span>
        <span class="diff ${q.difficulty}">${q.difficulty}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="options" id="opts-${q.id}">${optionsHtml}</div>
      ${!isExam ? `<button class="show-sol-btn" onclick="toggleSolution('${q.id}')">Show Solution</button>` : ''}
      <div class="solution-box ${wasAnswered ? 'visible' : ''}" id="sol-${q.id}">
        <h4>Solution</h4>
        <div class="step">${(q.solution || '').replace(/\n/g, '<br>')}</div>
      </div>
    `;
    card.dataset.selected = '';
    container.appendChild(card);
  });
}

function answerQuestion(qId, selected) {
  if (state.progress[qId] !== undefined) return; // already answered
  const q = QUESTIONS.find(x => x.id === qId);
  const isCorrect = selected === q.correct;
  state.progress[qId] = isCorrect;
  saveProgress();

  const card = document.getElementById('qcard-' + qId);
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  card.dataset.selected = selected;

  const opts = card.querySelectorAll('.option');
  opts.forEach((opt, i) => {
    if (i === q.correct) opt.classList.add('correct-answer');
    else if (i === selected && !isCorrect) opt.classList.add('wrong-answer');
    opt.style.pointerEvents = 'none';
  });

  document.getElementById('sol-' + qId).classList.add('visible');
  renderDashboard();
}

function toggleSolution(qId) {
  const sol = document.getElementById('sol-' + qId);
  sol.classList.toggle('visible');
}

// ===== EXAM MODE =====
function showExamSetup() {
  state.currentView = 'exam';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('topicSection').className = 'section';
  document.getElementById('examSection').className = 'section active';
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('nav button')[1].classList.add('active');

  if (state.examMode) {
    renderExam();
    return;
  }

  document.getElementById('examSection').innerHTML = `
    <div class="exam-setup">
      <h2>Exam Simulation</h2>
      <p>40 randomly selected questions across all topics.<br>60 minutes time limit. Good luck!</p>
      <div style="margin-bottom:20px">
        <label style="color:var(--text2);display:block;margin-bottom:8px">Number of questions:</label>
        <select id="examCount" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:1rem">
          <option value="20">20 questions (30 min)</option>
          <option value="40" selected>40 questions (60 min)</option>
          <option value="60">60 questions (90 min)</option>
        </select>
      </div>
      <button onclick="startExam()">Start Exam</button>
    </div>
  `;
}

function startExam() {
  const count = parseInt(document.getElementById('examCount').value);
  const timeMap = {20:1800, 40:3600, 60:5400};
  state.examTimeLeft = timeMap[count];

  // Select questions proportionally from each topic
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  state.examQuestions = shuffled.slice(0, count);
  state.examIndex = 0;
  state.examAnswers = {};
  state.examMode = true;

  state.examTimer = setInterval(() => {
    state.examTimeLeft--;
    updateTimer();
    if (state.examTimeLeft <= 0) {
      clearInterval(state.examTimer);
      finishExam();
    }
  }, 1000);

  renderExam();
}

function updateTimer() {
  const min = Math.floor(state.examTimeLeft / 60);
  const sec = state.examTimeLeft % 60;
  const el = document.getElementById('examTimer');
  if (!el) return;
  el.textContent = `${min}:${sec.toString().padStart(2,'0')}`;
  el.className = 'timer' + (state.examTimeLeft < 300 ? ' danger' : state.examTimeLeft < 600 ? ' warning' : '');
}

function renderExam() {
  const section = document.getElementById('examSection');
  const q = state.examQuestions[state.examIndex];
  const answered = Object.keys(state.examAnswers).length;
  const letters = ['A','B','C','D'];

  let optionsHtml = '';
  q.options.forEach((opt, i) => {
    const sel = state.examAnswers[q.id] === i ? ' selected' : '';
    optionsHtml += `<div class="option${sel}" onclick="selectExamAnswer('${q.id}',${i})">
      <span class="letter">${letters[i]}</span><span>${opt}</span></div>`;
  });

  const min = Math.floor(state.examTimeLeft/60);
  const sec = state.examTimeLeft%60;

  section.innerHTML = `
    <div class="exam-header">
      <div class="exam-progress">Question ${state.examIndex+1} of ${state.examQuestions.length} | ${answered} answered</div>
      <div class="timer" id="examTimer">${min}:${sec.toString().padStart(2,'0')}</div>
      <div class="exam-controls">
        ${state.examIndex > 0 ? '<button onclick="examNav(-1)">Previous</button>' : ''}
        ${state.examIndex < state.examQuestions.length-1 ? '<button onclick="examNav(1)">Next</button>' : ''}
        <button class="primary" onclick="finishExam()">Submit Exam</button>
      </div>
    </div>
    <div class="question-card">
      <div class="q-header">
        <span class="q-num">Question ${state.examIndex+1}</span>
        <span class="diff ${q.difficulty}">${q.difficulty}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="options">${optionsHtml}</div>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:16px">
      ${state.examQuestions.map((eq, i) => `<div onclick="examJump(${i})" style="width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.75rem;border:1px solid ${i===state.examIndex?'var(--accent)':'var(--border)'};background:${state.examAnswers[eq.id]!==undefined?'var(--accent)':'var(--card)'};color:${state.examAnswers[eq.id]!==undefined?'#fff':'var(--text2)'}">${i+1}</div>`).join('')}
    </div>
  `;
}

function selectExamAnswer(qId, idx) {
  state.examAnswers[qId] = idx;
  renderExam();
}

function examNav(dir) {
  state.examIndex = Math.max(0, Math.min(state.examQuestions.length-1, state.examIndex+dir));
  renderExam();
}

function examJump(idx) {
  state.examIndex = idx;
  renderExam();
}

function finishExam() {
  if (!confirm('Submit your exam? You cannot change answers after this.')) return;
  clearInterval(state.examTimer);
  state.examMode = false;

  let correct = 0;
  const topicBreakdown = {};
  state.examQuestions.forEach(q => {
    const isCorrect = state.examAnswers[q.id] === q.correct;
    if (isCorrect) correct++;
    if (!topicBreakdown[q.topic]) topicBreakdown[q.topic] = {correct:0,total:0};
    topicBreakdown[q.topic].total++;
    if (isCorrect) topicBreakdown[q.topic].correct++;
  });

  const total = state.examQuestions.length;
  const pct = Math.round(correct/total*100);
  state.examHistory.push({date:new Date().toISOString(),score:pct,correct,total});
  saveProgress();

  let breakdownHtml = '';
  Object.entries(topicBreakdown).forEach(([tid,s]) => {
    const tname = TOPICS.find(t=>t.id===tid)?.name||tid;
    breakdownHtml += `<div><span>${tname}</span><span>${s.correct}/${s.total}</span></div>`;
  });

  const section = document.getElementById('examSection');
  section.innerHTML = `
    <div class="results-content" style="margin:40px auto">
      <h2>Exam Results</h2>
      <div class="score-circle" style="border-color:${pct>=70?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}">${pct}%</div>
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:1.2rem;font-weight:600">${correct} of ${total} correct</div>
        <div style="color:var(--text2)">${pct>=70?'Well done!':pct>=50?'Keep practicing!':'Review the topics and try again.'}</div>
      </div>
      <div class="breakdown"><h3 style="margin-bottom:8px">Topic Breakdown</h3>${breakdownHtml}</div>
      <div style="margin-top:24px;text-align:center">
        <button onclick="reviewExam()" style="background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:6px;cursor:pointer;margin-right:8px">Review Answers</button>
        <button onclick="showExamSetup()" style="background:var(--accent);border:none;color:#fff;padding:10px 20px;border-radius:6px;cursor:pointer">New Exam</button>
      </div>
    </div>
  `;
}

function reviewExam() {
  const section = document.getElementById('examSection');
  let html = `<div class="section-header"><h2>Exam Review</h2><button class="back-btn" onclick="showExamSetup()">Back</button></div>`;
  const letters = ['A','B','C','D'];

  state.examQuestions.forEach((q, idx) => {
    const userAns = state.examAnswers[q.id];
    const isCorrect = userAns === q.correct;

    let optionsHtml = '';
    q.options.forEach((opt, i) => {
      let cls = 'option';
      if (i === q.correct) cls += ' correct-answer';
      else if (i === userAns && !isCorrect) cls += ' wrong-answer';
      optionsHtml += `<div class="${cls}" style="pointer-events:none"><span class="letter">${letters[i]}</span><span>${opt}</span></div>`;
    });

    html += `
      <div class="question-card ${isCorrect?'correct':'incorrect'}">
        <div class="q-header"><span class="q-num">Q${idx+1}</span><span class="diff ${q.difficulty}">${q.difficulty}</span></div>
        <div class="q-text">${q.text}</div>
        <div class="options">${optionsHtml}</div>
        <div class="solution-box visible"><h4>Solution</h4><div class="step">${(q.solution||'').replace(/\n/g,'<br>')}</div></div>
      </div>`;
  });
  section.innerHTML = html;
}

// ===== INIT =====
renderDashboard();
</script>
