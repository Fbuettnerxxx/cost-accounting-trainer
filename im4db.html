<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUM IM4DB Exam Trainer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#0065BD;--accent2:#1a8cff;--green:#2ea043;--red:#f85149;--orange:#d29922;--purple:#a371f7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
a{color:var(--accent2);text-decoration:none}
.container{max-width:1100px;margin:0 auto;padding:0 20px}
header{background:linear-gradient(135deg,#0a0e14,#0d1117);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
header .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.logo{font-size:1.4rem;font-weight:700;color:var(--accent2)}
.logo span{color:var(--text2);font-weight:400;font-size:.85rem;margin-left:8px}
nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
nav button{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:.2s}
nav button:hover,nav button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
nav a.nav-link{background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:.85rem;transition:.2s}
nav a.nav-link:hover{border-color:var(--accent);color:var(--text)}
.dashboard{padding:30px 0}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:30px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;color:var(--accent2)}
.stat-card .label{color:var(--text2);font-size:.85rem;margin-top:4px}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.topic-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.topic-card .topic-num{position:absolute;top:12px;right:12px;font-size:.7rem;padding:3px 8px;border-radius:4px;font-weight:600;background:#0065BD33;color:var(--accent2)}
.topic-card h3{font-size:1.05rem;margin-bottom:6px;padding-right:60px}
.topic-card .desc{color:var(--text2);font-size:.8rem;margin-bottom:12px}
.topic-card .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.topic-card .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:.3s}
.topic-card .meta{display:flex;justify-content:space-between;margin-top:8px;font-size:.76rem;color:var(--text2)}
.topic-card .meta .got-it{color:var(--green)}
.topic-card .meta .missed{color:var(--red)}
.section{padding:30px 0;display:none}
.section.active{display:block}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-header h2{font-size:1.5rem}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.85rem}
.back-btn:hover{border-color:var(--accent)}
/* Theory cheat sheet */
.theory-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:24px}
.theory-box h3{color:var(--accent2);margin-bottom:12px;font-size:1.05rem}
.theory-box ul{padding-left:20px}
.theory-box li{margin-bottom:5px;color:var(--text2);font-size:.88rem}
.theory-box li strong{color:var(--text)}
.theory-box .tag{display:inline-block;background:#0065BD22;color:var(--accent2);padding:1px 7px;border-radius:4px;font-size:.75rem;margin-right:4px}
.collapsible-theory{margin-bottom:16px}
.collapsible-theory summary{cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:600;color:var(--accent2);user-select:none;transition:.2s}
.collapsible-theory summary:hover{border-color:var(--accent)}
.collapsible-theory[open] summary{border-radius:8px 8px 0 0;border-bottom-color:transparent}
.collapsible-theory .theory-inner{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:16px 18px}
.caret{transition:.2s}
details[open] .caret{transform:rotate(90deg)}
/* Flashcard */
.flashcard-controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.flashcard-controls select,.flashcard-controls button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:.2s}
.flashcard-controls button:hover,.flashcard-controls button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.flashcard-progress{color:var(--text2);font-size:.85rem;margin-left:auto}
.flashcard-wrap{perspective:1200px;margin-bottom:24px}
.flashcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 36px;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;transition:border-color .2s;position:relative}
.flashcard .fc-topic-label{position:absolute;top:14px;left:18px;font-size:.72rem;color:var(--text2);background:var(--card2);padding:2px 9px;border-radius:4px}
.flashcard .fc-counter{position:absolute;top:14px;right:18px;font-size:.72rem;color:var(--text2)}
.flashcard .fc-question{font-size:1.2rem;font-weight:600;line-height:1.5;color:var(--text);max-width:700px}
.flashcard .fc-hint{font-size:.8rem;color:var(--text2);margin-top:16px}
.flashcard .fc-answer{margin-top:20px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px 20px;font-size:1rem;line-height:1.7;color:var(--text);text-align:left;width:100%;max-width:700px;display:none}
.flashcard .fc-answer.visible{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.flashcard .fc-answer strong{color:var(--accent2)}
.reveal-btn{background:var(--accent);color:#fff;border:none;padding:11px 28px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:20px;transition:.15s}
.reveal-btn:hover{background:var(--accent2)}
.reveal-btn:disabled{background:var(--card2);color:var(--text2);cursor:default}
.rating-bar{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.rate-btn{padding:10px 24px;border-radius:8px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s;min-width:110px}
.rate-btn.got-it{background:#2ea04322;color:var(--green);border:1px solid var(--green)}
.rate-btn.got-it:hover{background:var(--green);color:#fff}
.rate-btn.partial{background:#d2992222;color:var(--orange);border:1px solid var(--orange)}
.rate-btn.partial:hover{background:var(--orange);color:#fff}
.rate-btn.missed{background:#f8514922;color:var(--red);border:1px solid var(--red)}
.rate-btn.missed:hover{background:var(--red);color:#fff}
.fc-nav-row{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.fc-nav-row button{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:7px 18px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:.2s}
.fc-nav-row button:hover{border-color:var(--accent);color:var(--text)}
.fc-done-banner{background:var(--card);border:1px solid var(--green);border-radius:12px;padding:36px;text-align:center;margin:20px 0}
.fc-done-banner h3{color:var(--green);font-size:1.4rem;margin-bottom:10px}
.fc-done-banner p{color:var(--text2);margin-bottom:20px}
.fc-done-banner .score-row{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.fc-done-banner .score-item{background:var(--bg);border-radius:8px;padding:14px 20px;text-align:center}
.fc-done-banner .score-item .snum{font-size:1.6rem;font-weight:700}
.fc-done-banner .score-item.g .snum{color:var(--green)}
.fc-done-banner .score-item.p .snum{color:var(--orange)}
.fc-done-banner .score-item.m .snum{color:var(--red)}
.fc-done-banner .score-item .slabel{font-size:.78rem;color:var(--text2);margin-top:2px}
/* Exam simulation */
.exam-setup{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:36px;max-width:580px;margin:40px auto;text-align:center}
.exam-setup h2{margin-bottom:12px}
.exam-setup p{color:var(--text2);margin-bottom:24px;font-size:.95rem}
.exam-setup button{background:var(--accent);color:#fff;border:none;padding:13px 36px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600;transition:.15s}
.exam-setup button:hover{background:var(--accent2)}
.exam-running-header{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 22px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:68px;z-index:50}
.timer{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums}
.timer.warning{color:var(--orange)}
.timer.danger{color:var(--red)}
.exam-q-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px}
.exam-q-card .eq-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.exam-q-card .eq-num{font-size:.8rem;color:var(--text2);font-weight:600}
.exam-q-card .eq-topic{font-size:.75rem;background:#0065BD22;color:var(--accent2);padding:2px 9px;border-radius:4px}
.exam-q-card .eq-question{font-size:1.05rem;line-height:1.6;margin-bottom:18px}
.exam-q-card textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:12px;font-size:.9rem;font-family:inherit;resize:vertical;min-height:100px;line-height:1.6;transition:.15s}
.exam-q-card textarea:focus{outline:none;border-color:var(--accent)}
.exam-q-card .eq-reveal-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:7px 16px;border-radius:6px;cursor:pointer;font-size:.82rem;margin-top:10px;transition:.2s}
.exam-q-card .eq-reveal-btn:hover{border-color:var(--accent2);color:var(--text)}
.exam-q-card .eq-answer-box{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:14px;margin-top:12px;font-size:.88rem;display:none;line-height:1.7}
.exam-q-card .eq-answer-box.visible{display:block;animation:fadeIn .2s ease}
.exam-q-card .eq-self-rate{display:none;margin-top:12px}
.exam-q-card .eq-self-rate.visible{display:flex;gap:8px;flex-wrap:wrap}
.eq-rate-btn{padding:7px 18px;border-radius:6px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;transition:.15s}
.eq-rate-btn.got-it{background:#2ea04322;color:var(--green);border:1px solid var(--green)}
.eq-rate-btn.got-it:hover,.eq-rate-btn.got-it.selected{background:var(--green);color:#fff}
.eq-rate-btn.partial{background:#d2992222;color:var(--orange);border:1px solid var(--orange)}
.eq-rate-btn.partial:hover,.eq-rate-btn.partial.selected{background:var(--orange);color:#fff}
.eq-rate-btn.missed{background:#f8514922;color:var(--red);border:1px solid var(--red)}
.eq-rate-btn.missed:hover,.eq-rate-btn.missed.selected{background:var(--red);color:#fff}
.exam-footer{display:flex;justify-content:center;gap:12px;margin-top:24px;flex-wrap:wrap}
.exam-footer button{padding:12px 30px;border-radius:8px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;transition:.15s}
.exam-footer .submit-exam-btn{background:var(--accent);color:#fff}
.exam-footer .submit-exam-btn:hover{background:var(--accent2)}
.results-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.results-content{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.results-content h2{text-align:center;margin-bottom:6px}
.results-content .results-sub{text-align:center;color:var(--text2);font-size:.88rem;margin-bottom:20px}
.score-circle{width:120px;height:120px;border-radius:50%;border:4px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;flex-direction:column}
.score-circle .sc-num{font-size:2rem;font-weight:700;color:var(--accent2)}
.score-circle .sc-label{font-size:.7rem;color:var(--text2)}
.results-breakdown{margin-top:16px}
.results-breakdown .rb-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:.88rem}
.results-breakdown .rb-row:last-child{border-bottom:none}
.results-breakdown .rb-val.g{color:var(--green)}
.results-breakdown .rb-val.o{color:var(--orange)}
.results-breakdown .rb-val.r{color:var(--red)}
.results-content .results-btns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center}
.results-content .results-btns button{padding:10px 24px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:.88rem;transition:.15s}
.results-content .results-btns button:hover{border-color:var(--accent);color:var(--accent2)}
.results-content .results-btns button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.hidden{display:none!important}
/* Mnemonic badge */
.mnemonic-badge{display:inline-flex;align-items:center;gap:5px;background:#a371f722;color:var(--purple);border:1px solid #a371f744;border-radius:12px;padding:2px 10px;font-size:.72rem;font-weight:700;cursor:pointer;transition:.2s;user-select:none;margin-top:10px}
.mnemonic-badge:hover{background:#a371f744}
.mnemonic-expand{display:none;margin-top:6px;background:#a371f711;border:1px solid #a371f733;border-radius:8px;padding:8px 12px;font-size:.8rem;color:var(--text2);line-height:1.5}
.mnemonic-expand.open{display:block;animation:fadeIn .2s ease}
/* SRS stat chips */
.sr-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.sr-chip .sc-val{font-size:1.3rem;font-weight:700}
/* Speed Round */
.speed-setup{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:36px;max-width:500px;margin:30px auto;text-align:center}
.speed-setup h2{margin-bottom:10px}
.speed-setup p{color:var(--text2);margin-bottom:24px;font-size:.92rem}
.speed-count-btns{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.speed-count-btn{background:var(--card2);border:2px solid var(--border);color:var(--text);padding:10px 24px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;transition:.2s}
.speed-count-btn.selected,.speed-count-btn:hover{border-color:var(--accent);color:var(--accent2);background:#0065BD22}
.speed-start-btn{background:linear-gradient(135deg,#f85149,#d29922);color:#fff;border:none;padding:14px 40px;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 4px 20px #f8514944}
.speed-start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px #f8514966}
/* Speed round card */
.speed-card-wrap{max-width:680px;margin:0 auto}
.speed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.streak-counter{display:flex;align-items:center;gap:6px;font-size:1.1rem;font-weight:700;color:var(--orange)}
.speed-progress-text{color:var(--text2);font-size:.85rem}
/* Timer ring */
.timer-ring-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.timer-ring-wrap .timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:700;font-variant-numeric:tabular-nums;transition:color .5s}
/* Speed flashcard */
.speed-flashcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 28px;text-align:center;position:relative;transition:border-color .3s}
.speed-flashcard .sf-topic{font-size:.72rem;color:var(--text2);margin-bottom:12px}
.speed-flashcard .sf-question{font-size:1.25rem;font-weight:600;line-height:1.5;margin-bottom:20px}
.speed-flashcard .sf-answer{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 18px;font-size:.95rem;line-height:1.7;text-align:left;display:none;margin-bottom:16px}
.speed-flashcard .sf-answer.visible{display:block;animation:fadeIn .2s ease}
.speed-rating{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.speed-rating .rate-btn{font-size:.85rem;padding:9px 20px}
.auto-advance-bar{height:3px;background:var(--border);border-radius:2px;margin-top:14px;overflow:hidden}
.auto-advance-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width linear}
/* Speed round results */
.speed-results{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 30px;max-width:560px;margin:30px auto;text-align:center}
.speed-results h2{font-size:1.6rem;margin-bottom:6px}
.speed-results .sr-sub{color:var(--text2);margin-bottom:24px}
.speed-results .big-score{font-size:3.5rem;font-weight:700;color:var(--accent2);margin:16px 0}
.speed-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:20px 0}
.speed-stat-item{background:var(--bg);border-radius:8px;padding:14px 10px;text-align:center}
.speed-stat-item .ssnum{font-size:1.5rem;font-weight:700}
.speed-stat-item .sslabel{font-size:.75rem;color:var(--text2);margin-top:3px}
@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .topics-grid{grid-template-columns:1fr}
  header .container{flex-direction:column;align-items:flex-start}
  nav{width:100%;overflow-x:auto}
  .flashcard{padding:28px 20px}
  .rating-bar{gap:8px}
  .rate-btn{min-width:90px;padding:9px 14px;font-size:.82rem}
}
/* ==================== STUDY COACH ==================== */
.coach-view{padding:30px 0}
.coach-hero{background:linear-gradient(135deg,#0d1f3c,#0a1628);border:1px solid #1a3a6b;border-radius:14px;padding:30px 28px;margin-bottom:24px;position:relative;overflow:hidden}
.coach-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,#0065BD33,transparent 70%);pointer-events:none}
.coach-hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px}
.coach-day-badge{display:flex;flex-direction:column}
.coach-day-num{font-size:2.6rem;font-weight:800;color:var(--accent2);line-height:1}
.coach-day-label{font-size:.85rem;color:var(--text2);margin-top:2px}
.coach-countdown{text-align:right}
.coach-countdown .cdnum{font-size:2rem;font-weight:700;color:var(--orange);line-height:1}
.coach-countdown .cdlabel{font-size:.8rem;color:var(--text2);margin-top:2px}
.coach-phase{display:inline-flex;align-items:center;gap:8px;background:#0065BD22;border:1px solid #0065BD55;border-radius:8px;padding:8px 16px;font-size:.95rem;font-weight:600;color:var(--accent2);margin-bottom:16px}
.coach-overall-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.coach-overall-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:.5s}
.coach-bar-label{font-size:.75rem;color:var(--text2);display:flex;justify-content:space-between}
.coach-tasks{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.coach-task{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:.2s}
.coach-task.done{background:#0d2218;border-color:#2ea04344}
.coach-task.active-task{border-color:var(--accent);background:#0d1f3c}
.coach-task-icon{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem;transition:.2s}
.coach-task.done .coach-task-icon{background:var(--green);border-color:var(--green);color:#fff}
.coach-task-body{flex:1;min-width:0}
.coach-task-label{font-size:.92rem;font-weight:600;color:var(--text);margin-bottom:2px}
.coach-task.done .coach-task-label{color:var(--text2);text-decoration:line-through}
.coach-task-meta{font-size:.75rem;color:var(--text2)}

// ============================================================
// STATE & STORAGE
// ============================================================
let progress = {};  // { cardIndex: 'got'|'partial'|'missed' }
let examsDone = 0;

function saveProgress() {
  const data = { progress, examsDone };
  localStorage.setItem('im4dbProgress', JSON.stringify(data));
}

function loadProgress() {
  try {
    const raw = localStorage.getItem('im4dbProgress');
    if (raw) {
      const data = JSON.parse(raw);
      progress = data.progress || {};
      examsDone = data.examsDone || 0;
    }
  } catch(e) { progress = {}; examsDone = 0; }
}

function getTopicStats(topicId) {
  const cards = CARDS.filter(c => c.t === topicId);
  let got = 0, partial = 0, missed = 0;
  cards.forEach((c, i) => {
    const idx = CARDS.indexOf(c);
    const r = progress[idx];
    if (r === 'got') got++;
    else if (r === 'partial') partial++;
    else if (r === 'missed') missed++;
  });
  return { total: cards.length, got, partial, missed, seen: got+partial+missed };
}

function getGlobalStats() {
  let got=0, partial=0, missed=0;
  CARDS.forEach((c,i) => {
    const r = progress[i];
    if (r === 'got') got++;
    else if (r === 'partial') partial++;
    else if (r === 'missed') missed++;
  });
  return { got, partial, missed, seen: got+partial+missed };
}

// ============================================================
// SECTION NAVIGATION
// ============================================================
let currentSection = 'coach';

function showSection(id) {
  ['coach','dashboard','flashcards','smartreview','speedround','exam'].forEach(s => {
    const el = document.getElementById(s);
    if(el) el.style.display = s === id ? 'block' : 'none';
  });
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const map = { coach: 0, dashboard: 1, flashcards: 2, smartreview: 3, speedround: 4, exam: 5 };
  document.querySelectorAll('nav button')[map[id]]?.classList.add('active');
  currentSection = id;
  if (id === 'coach') renderCoach();
  if (id === 'dashboard') renderDashboard();
  if (id === 'flashcards') renderFlashcardSection();
  if (id === 'smartreview') renderSmartReview();
  if (id === 'speedround') renderSpeedSetup();
  if (id === 'exam') renderExamSetup();
  window.scrollTo(0,0);
}

// ============================================================
// DASHBOARD
// ============================================================
function renderDashboard() {
  const gs = getGlobalStats();
  document.getElementById('statTotal').textContent = gs.seen;
  document.getElementById('statGot').textContent = gs.got;
  document.getElementById('statPartial').textContent = gs.partial;
  document.getElementById('statMissed').textContent = gs.missed;
  document.getElementById('statExams').textContent = examsDone;

  const grid = document.getElementById('topicsGrid');
  grid.innerHTML = TOPICS.map(tp => {
    const s = getTopicStats(tp.id);
    const pct = s.total > 0 ? Math.round(s.seen / s.total * 100) : 0;
    return `<div class="topic-card" onclick="openTopic('${tp.id}')">
      <div class="topic-num">T${tp.num}</div>
      <h3>${tp.name}</h3>
      <div class="desc">${tp.desc}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="meta">
        <span>${s.seen}/${s.total} seen</span>
        <span class="got-it">${s.got} got it</span>
        <span class="missed">${s.missed} missed</span>
      </div>
    </div>`;
  }).join('');
}

function openTopic(topicId) {
  showSection('flashcards');
  document.getElementById('fcTopicFilter').value = topicId;
  initFlashcards();
}

// FLASHCARD ENGINE

let fcQueue = [];
let fcIndex = 0;
let fcRevealed = false;

function renderFlashcardSection() {
  // Populate topic filter
  const sel = document.getElementById('fcTopicFilter');
  if (sel.children.length === 1) {
    TOPICS.forEach(tp => {
      const opt = document.createElement('option');
      opt.value = tp.id;
      opt.textContent = `T${tp.num}: ${tp.name}`;
      sel.appendChild(opt);
    });
  }
  initFlashcards();
  renderTheory();
}

function initFlashcards() {
  const topicFilter = document.getElementById('fcTopicFilter').value;
  const order = document.getElementById('fcOrderFilter').value;

  let cards = CARDS.map((c,i) => ({...c, idx:i}));
  if (topicFilter !== 'all') cards = cards.filter(c => c.t === topicFilter);

  if (order === 'random') {
    cards = cards.sort(() => Math.random() - 0.5);
  } else if (order === 'weak') {
    cards = cards.sort((a,b) => {
      const rank = r => r === 'missed' ? 0 : r === 'partial' ? 1 : r === 'got' ? 2 : 3;
      return rank(progress[a.idx]) - rank(progress[b.idx]);
    });
  }

  fcQueue = cards;
  fcIndex = 0;
  fcRevealed = false;
  renderFlashcard();

  const topicFilter2 = document.getElementById('fcTopicFilter').value;
  const tp = TOPICS.find(t => t.id === topicFilter2);
  document.getElementById('fcSectionTitle').textContent = tp ? `T${tp.num}: ${tp.name}` : 'All Flashcards';
  renderTheory();
}

function renderFlashcard() {
  const area = document.getElementById('fcArea');
  if (fcQueue.length === 0) {
    area.innerHTML = `<div class="fc-done-banner"><h3>No cards found</h3><p>Try changing the filter.</p></div>`;
    return;
  }
  if (fcIndex >= fcQueue.length) {
    // Done!
    const gs = { got:0, partial:0, missed:0 };
    fcQueue.forEach(c => {
      const r = progress[c.idx];
      if (r === 'got') gs.got++;
      else if (r === 'partial') gs.partial++;
      else if (r === 'missed') gs.missed++;
    });
    area.innerHTML = `<div class="fc-done-banner">
      <h3>Round Complete!</h3>
      <p>You went through all ${fcQueue.length} cards in this set.</p>
      <div class="score-row">
        <div class="score-item g"><div class="snum">${gs.got}</div><div class="slabel">Got it</div></div>
        <div class="score-item p"><div class="snum">${gs.partial}</div><div class="slabel">Partial</div></div>
        <div class="score-item m"><div class="snum">${gs.missed}</div><div class="slabel">Missed</div></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="rate-btn got-it" onclick="fcIndex=0;renderFlashcard()">Restart</button>
        <button class="rate-btn partial" onclick="document.getElementById('fcOrderFilter').value='weak';initFlashcards()">Review Weak Cards</button>
        <button class="rate-btn missed" onclick="showSection('dashboard')">Back to Dashboard</button>
      </div>
    </div>`;
    return;
  }

  const card = fcQueue[fcIndex];
  const topicObj = TOPICS.find(t => t.id === card.t);
  const prevRating = progress[card.idx];
  const ratingBadge = prevRating ?
    `<span style="font-size:.72rem;padding:2px 8px;border-radius:4px;background:${prevRating==='got'?'#2ea04333':prevRating==='partial'?'#d2992233':'#f8514933'};color:${prevRating==='got'?'var(--green)':prevRating==='partial'?'var(--orange)':'var(--red)'}">Previously: ${prevRating}</span>` : '';

  area.innerHTML = `
    <div class="flashcard" id="fcCard">
      <div class="fc-topic-label">T${topicObj.num}: ${topicObj.name}</div>
      <div class="fc-counter">${fcIndex+1} / ${fcQueue.length} ${ratingBadge}</div>
      <div class="fc-question">${card.q}</div>
      <div class="fc-hint">Think about your answer, then click reveal</div>
      <div class="fc-answer" id="fcAnswer">${card.a}${card.mnemonic ? `<div class="mnemonic-badge" onclick="this.nextElementSibling.classList.toggle('open')">🧠 ${card.mnemonic.key}</div><div class="mnemonic-expand">"${card.mnemonic.phrase}"</div>` : ''}</div>
      <button class="reveal-btn" id="fcRevealBtn" onclick="revealAnswer()">Reveal Answer</button>
      <div class="rating-bar hidden" id="fcRatingBar">
        <button class="rate-btn got-it" onclick="rateCard('got')">Got it ✓</button>
        <button class="rate-btn partial" onclick="rateCard('partial')">Partial ~</button>
        <button class="rate-btn missed" onclick="rateCard('missed')">Missed it ✗</button>
      </div>
    </div>
    <div class="fc-nav-row">
      <button onclick="fcIndex=Math.max(0,fcIndex-1);renderFlashcard()">← Prev</button>
      <button onclick="skipCard()">Skip →</button>
    </div>
    <div id="fcProgress2" style="text-align:center;margin-top:10px;font-size:.78rem;color:var(--text2)"></div>
  `;
  updateFcProgress();
}

function updateFcProgress() {
  const el = document.getElementById('fcProgress');
  if(el) el.textContent = `${fcIndex+1} / ${fcQueue.length}`;
}

function revealAnswer() {
  document.getElementById('fcAnswer').classList.add('visible');
  document.getElementById('fcRevealBtn').style.display = 'none';
  document.getElementById('fcRatingBar').classList.remove('hidden');
  document.querySelector('.fc-hint').style.display = 'none';
  fcRevealed = true;
}

function rateCard(rating) {
  const card = fcQueue[fcIndex];
  progress[card.idx] = rating;
  saveProgress();
  fcIndex++;
  fcRevealed = false;
  renderFlashcard();
  updateFcProgress();
  // update dashboard stats silently
}

function skipCard() {
  fcIndex++;
  fcRevealed = false;
  renderFlashcard();
  updateFcProgress();
}

function startExam() {
  // Pick 1 random card per topic

    const cards = CARDS.filter(c => c.t === tp.id);
    return cards[Math.floor(Math.random() * cards.length)];

  const m = Math.floor(examTimeLeft/60);

  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className = 'timer';
  if (examTimeLeft <= 600) el.classList.add('danger');

// SPACED REPETITION SYSTEM (SRS)
// ============================================================
let srsData = {};

function loadSRS() {
  try {
    const raw = localStorage.getItem('im4dbSRS');
    if (raw) srsData = JSON.parse(raw);
  } catch(e) { srsData = {}; }
}

function saveSRS() {
  localStorage.setItem('im4dbSRS', JSON.stringify(srsData));
}

function getSRSCard(cardIdx) {
  if (!srsData[cardIdx]) {
    srsData[cardIdx] = { interval: 1, easeFactor: 2.5, nextReview: 0, repetitions: 0, lastReview: null };
  }
  return srsData[cardIdx];
}

function updateSRS(cardIdx, rating) {
  const s = getSRSCard(cardIdx);
  const now = Date.now();
  s.lastReview = now;

  if (rating === 'got') {
    s.repetitions++;
    if (s.repetitions === 1) s.interval = 1;
    else if (s.repetitions === 2) s.interval = 10;
    else s.interval = Math.round(s.interval * s.easeFactor);
    s.easeFactor = Math.min(3.0, s.easeFactor + 0.1);
    s.nextReview = now + s.interval * 60 * 1000; // minutes → ms
  } else if (rating === 'partial') {
    s.interval = Math.max(1, Math.round(s.interval * 0.6));
    s.nextReview = now + s.interval * 60 * 1000;
  } else { // missed
    s.interval = 1;
    s.repetitions = 0;
    s.easeFactor = Math.max(1.3, s.easeFactor - 0.2);
    s.nextReview = now + 60 * 1000; // 1 min
  }
  srsData[cardIdx] = s;
  saveSRS();
}

function getDueCards() {
  const now = Date.now();
  return CARDS
    .map((c, i) => ({ ...c, idx: i, srs: getSRSCard(i) }))
    .filter(c => c.srs.nextReview <= now)
    .sort((a, b) => a.srs.nextReview - b.srs.nextReview);
}

function getNextDueMs() {
  const now = Date.now();
  const future = CARDS
    .map((c, i) => getSRSCard(i).nextReview)
    .filter(t => t > now);
  return future.length ? Math.min(...future) : null;
}

function getSRSStreak() {
  const today = new Date().toDateString();
  let streak = parseInt(localStorage.getItem('im4dbStreak') || '0');
  const lastDay = localStorage.getItem('im4dbStreakDay') || '';
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (lastDay === today) return streak;
  if (lastDay === yesterday) return streak; // will increment on first review today
  return 0;
}

function markStreakToday() {
  const today = new Date().toDateString();
  const lastDay = localStorage.getItem('im4dbStreakDay') || '';
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  let streak = parseInt(localStorage.getItem('im4dbStreak') || '0');
  if (lastDay === today) return;
  if (lastDay === yesterday) streak++;
  else streak = 1;
  localStorage.setItem('im4dbStreak', streak);
  localStorage.setItem('im4dbStreakDay', today);
}

function countLearnedToday() {
  const today = new Date().toDateString();
  return Object.values(srsData).filter(s => {
    if (!s.lastReview) return false;
    return new Date(s.lastReview).toDateString() === today;
  }).length;
}

function formatTimeUntil(ms) {
  const diff = ms - Date.now();
  if (diff <= 0) return 'now';
  const mins = Math.round(diff / 60000);
  if (mins < 60) return `${mins} min`;
  const hrs = Math.round(diff / 3600000);
  if (hrs < 24) return `${hrs} hr`;
  return `${Math.round(diff / 86400000)} days`;
}

// Smart Review state
let srQueue = [];
let srIndex = 0;
let srRevealed = false;

function renderSmartReview() {
  const due = getDueCards();
  const nextMs = getNextDueMs();

    <div class="sr-chip"><div><div class="sc-val" style="color:var(--orange)">${streak}</div><div style="font-size:.75rem;color:var(--text2)">Day Streak 🔥</div></div></div>

  srQueue = due;

function renderSRCard() {
  const area = document.getElementById('srArea');
  if (srIndex >= srQueue.length) {
    area.innerHTML = `<div class="fc-done-banner">
      <h3>Smart Review Done!</h3>
      <p>You reviewed all ${srQueue.length} due cards.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="rate-btn got-it" onclick="renderSmartReview()">Refresh Queue</button>
        <button class="rate-btn partial" onclick="showSection('dashboard')">Dashboard</button>
      </div>
    </div>`;
    return;
  }

  const card = srQueue[srIndex];
  const topicObj = TOPICS.find(t => t.id === card.t);
  const srs = card.srs;
  const overdueText = srs.nextReview === 0 ? 'New card' :
    `Overdue by ${formatTimeUntil(srs.nextReview).replace('now','<1 min')}`;

  area.innerHTML = `
    <div class="flashcard" id="srCard">
      <div class="fc-topic-label">T${topicObj.num}: ${topicObj.name}</div>
      <div class="fc-counter">${srIndex+1} / ${srQueue.length} · <span style="color:var(--orange);font-size:.7rem">${overdueText}</span></div>
      <div class="fc-question">${card.q}</div>
      <div class="fc-hint">Think, then reveal</div>
      <div class="fc-answer" id="srAnswer">${card.a}${card.mnemonic ? `<div class="mnemonic-badge" onclick="this.nextElementSibling.classList.toggle('open')">🧠 ${card.mnemonic.key}</div><div class="mnemonic-expand">"${card.mnemonic.phrase}"</div>` : ''}</div>
      <button class="reveal-btn" id="srRevealBtn" onclick="revealSRAnswer()">Reveal Answer</button>
      <div class="rating-bar hidden" id="srRatingBar">
        <button class="rate-btn got-it" onclick="rateSRCard('got')">Got it ✓</button>
        <button class="rate-btn partial" onclick="rateSRCard('partial')">Partial ~</button>
        <button class="rate-btn missed" onclick="rateSRCard('missed')">Missed it ✗</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:.76rem;color:var(--text2)">
      Interval: ${srs.interval} min · Ease: ${srs.easeFactor.toFixed(1)} · Reps: ${srs.repetitions}
    </div>
  `;
}

function revealSRAnswer() {
  document.getElementById('srAnswer').classList.add('visible');
  document.getElementById('srRevealBtn').style.display = 'none';
  document.getElementById('srRatingBar').classList.remove('hidden');
  document.querySelector('#srCard .fc-hint').style.display = 'none';
}

function rateSRCard(rating) {
  const card = srQueue[srIndex];
  updateSRS(card.idx, rating);
  progress[card.idx] = rating;
  saveProgress();
  markStreakToday();

  // Update stats bar
  const learnedToday = countLearnedToday();
  const streak = getSRSStreak();
  const statsBar = document.getElementById('srStatsBar');
  if (statsBar) {
    const chips = statsBar.querySelectorAll('.sc-val');
    if (chips[1]) chips[1].textContent = learnedToday;
    if (chips[2]) chips[2].textContent = streak;
  }

  srIndex++;
  srRevealed = false;
  renderSRCard();
}

let speedCards = [];
let speedIdx = 0;
let speedRevealed = false;
let speedTimer = null;
let speedAutoTimer = null;
let speedTimeLeft = 30;
let speedStreak = 0;
let speedMaxStreak = 0;
let speedResults = [];
let speedCardCount = 10;
let speedCardTimes = [];
let speedCardStart = 0;

function renderSpeedSetup() {
  const area = document.getElementById('speedArea');
  const due = getDueCards();
  area.innerHTML = `<div class="speed-setup">
    <h2>🔥 Speed Round</h2>
    <p>30 seconds per card. Rate fast — SRS updates automatically.<br>${due.length} cards due now across all topics.</p>
    <div style="font-size:.85rem;color:var(--text2);margin-bottom:16px">Number of cards:</div>
    <div class="speed-count-btns">
      <button class="speed-count-btn ${speedCardCount===10?'selected':''}" onclick="selectSpeedCount(10,this)">10 cards</button>
      <button class="speed-count-btn ${speedCardCount===20?'selected':''}" onclick="selectSpeedCount(20,this)">20 cards</button>
      <button class="speed-count-btn ${speedCardCount===9999?'selected':''}" onclick="selectSpeedCount(9999,this)">All Due (${due.length})</button>
    </div>
    <button class="speed-start-btn" onclick="startSpeedRound()">Start Speed Round 🚀</button>
  </div>`;
}

function selectSpeedCount(n, btn) {
  speedCardCount = n;
  document.querySelectorAll('.speed-count-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function startSpeedRound() {
  const due = getDueCards();
  // Fall back to all cards (shuffled) if fewer due than requested
  let pool = due.length > 0 ? due : CARDS.map((c,i) => ({...c,idx:i,srs:getSRSCard(i)}));
  pool = pool.sort(() => Math.random() - 0.5);
  speedCards = pool.slice(0, Math.min(speedCardCount, pool.length));
  speedIdx = 0;
  speedStreak = 0;
  speedMaxStreak = 0;
  speedResults = [];
  speedCardTimes = [];
  renderSpeedCard();
}

function renderSpeedCard() {
  if (speedIdx >= speedCards.length) {
    renderSpeedResults();
    return;
  }
  speedRevealed = false;
  speedTimeLeft = 30;
  speedCardStart = Date.now();
  clearTimers();

  const card = speedCards[speedIdx];
  const topicObj = TOPICS.find(t => t.id === card.t);
  const area = document.getElementById('speedArea');
  area.innerHTML = `<div class="speed-card-wrap">
    <div class="speed-header">
      <div class="streak-counter" id="speedStreakEl">🔥 ${speedStreak} streak</div>
      <div class="speed-progress-text">${speedIdx+1} / ${speedCards.length}</div>
    </div>
    <div class="timer-ring-wrap">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="48" fill="none" stroke="var(--border)" stroke-width="7"/>
        <circle id="speedRingCircle" cx="55" cy="55" r="48" fill="none" stroke="var(--accent2)" stroke-width="7"
          stroke-dasharray="${2*Math.PI*48}" stroke-dashoffset="0" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear,stroke .5s"/>
      </svg>
      <div class="timer-num" id="speedTimerNum" style="color:var(--accent2)">30</div>
    </div>
    <div class="speed-flashcard" id="speedFlashCard">
      <div class="sf-topic">T${topicObj.num}: ${topicObj.name}</div>
      <div class="sf-question">${card.q}</div>
      <div class="sf-answer" id="sfAnswer">${card.a}${card.mnemonic ? `<div class="mnemonic-badge" onclick="this.nextElementSibling.classList.toggle('open')">🧠 ${card.mnemonic.key}</div><div class="mnemonic-expand">"${card.mnemonic.phrase}"</div>` : ''}</div>
      <button class="reveal-btn" id="sfRevealBtn" onclick="revealSpeedAnswer()">Reveal Answer</button>
      <div class="speed-rating hidden" id="sfRating">
        <button class="rate-btn got-it" onclick="rateSpeedCard('got')">Got it ✓</button>
        <button class="rate-btn partial" onclick="rateSpeedCard('partial')">Partial ~</button>
        <button class="rate-btn missed" onclick="rateSpeedCard('missed')">Missed ✗</button>
      </div>
      <div class="auto-advance-bar hidden" id="sfAutoBar"><div class="auto-advance-fill" id="sfAutoFill" style="width:100%"></div></div>
    </div>
  </div>`;

  startSpeedTimer();
}

function startSpeedTimer() {
  const circumference = 2 * Math.PI * 48;
  speedTimer = setInterval(() => {
    speedTimeLeft--;
    const el = document.getElementById('speedTimerNum');
    const ring = document.getElementById('speedRingCircle');
    if (!el || !ring) { clearTimers(); return; }

    el.textContent = speedTimeLeft;
    const offset = circumference * (1 - speedTimeLeft / 30);
    ring.style.strokeDashoffset = offset;

    if (speedTimeLeft <= 5) {
      el.style.color = 'var(--red)';
      ring.style.stroke = 'var(--red)';
      document.getElementById('speedFlashCard').style.borderColor = 'var(--red)';
    } else if (speedTimeLeft <= 15) {
      el.style.color = 'var(--orange)';
      ring.style.stroke = 'var(--orange)';
      document.getElementById('speedFlashCard').style.borderColor = 'var(--orange)';
    }

    if (speedTimeLeft <= 0) {
      clearTimers();
      autoMissSpeed();
    }
  }, 1000);
}

function clearTimers() {
  if (speedTimer) { clearInterval(speedTimer); speedTimer = null; }
  if (speedAutoTimer) { clearTimeout(speedAutoTimer); speedAutoTimer = null; }
}

function autoMissSpeed() {
  revealSpeedAnswer();
  rateSpeedCard('missed');
}

function revealSpeedAnswer() {
  clearTimers();
  speedRevealed = true;
  const ans = document.getElementById('sfAnswer');
  const btn = document.getElementById('sfRevealBtn');
  const rating = document.getElementById('sfRating');
  const autoBar = document.getElementById('sfAutoBar');
  if (ans) ans.classList.add('visible');
  if (btn) btn.style.display = 'none';
  if (rating) rating.classList.remove('hidden');
  if (autoBar) {
    autoBar.classList.remove('hidden');
    // 5-second auto-advance fill
    const fill = document.getElementById('sfAutoFill');
    if (fill) {
      fill.style.transition = 'width 5s linear';
      requestAnimationFrame(() => { fill.style.width = '0%'; });
    }
    speedAutoTimer = setTimeout(() => rateSpeedCard('missed'), 5000);
  }
}

function rateSpeedCard(rating) {
  clearTimers();
  const card = speedCards[speedIdx];
  const elapsed = Math.round((Date.now() - speedCardStart) / 1000);
  speedCardTimes.push(elapsed);

  updateSRS(card.idx, rating);
  progress[card.idx] = rating;
  saveProgress();
  markStreakToday();

  if (rating === 'got') {
    speedStreak++;
    speedMaxStreak = Math.max(speedMaxStreak, speedStreak);
  } else {
    speedStreak = 0;
  }
  speedResults.push(rating);
  speedIdx++;
  renderSpeedCard();
}

function renderSpeedResults() {
  const area = document.getElementById('speedArea');
  const got = speedResults.filter(r => r === 'got').length;
  const partial = speedResults.filter(r => r === 'partial').length;
  const missed = speedResults.filter(r => r === 'missed').length;
  const total = speedResults.length;
  const accuracy = total > 0 ? Math.round((got / total) * 100) : 0;
  const avgTime = speedCardTimes.length > 0 ? Math.round(speedCardTimes.reduce((a,b)=>a+b,0)/speedCardTimes.length) : 0;

  area.innerHTML = `<div class="speed-results">
    <h2>Speed Round Complete! 🏁</h2>
    <div class="sr-sub">${total} cards reviewed</div>
    <div class="big-score">${accuracy}%</div>
    <div style="color:var(--text2);font-size:.85rem;margin-bottom:8px">accuracy</div>
    <div class="speed-stats-grid">
      <div class="speed-stat-item"><div class="ssnum" style="color:var(--green)">${got}</div><div class="sslabel">Got It</div></div>
      <div class="speed-stat-item"><div class="ssnum" style="color:var(--orange)">${partial}</div><div class="sslabel">Partial</div></div>
      <div class="speed-stat-item"><div class="ssnum" style="color:var(--red)">${missed}</div><div class="sslabel">Missed</div></div>
      <div class="speed-stat-item"><div class="ssnum" style="color:var(--orange)">${avgTime}s</div><div class="sslabel">Avg Time</div></div>
      <div class="speed-stat-item"><div class="ssnum" style="color:var(--purple)">${speedMaxStreak}</div><div class="sslabel">Best Streak 🔥</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px">
      <button class="rate-btn got-it" onclick="renderSpeedSetup()">Play Again</button>
      <button class="rate-btn partial" onclick="showSection('smartreview')">Smart Review</button>
      <button class="rate-btn missed" onclick="showSection('dashboard')">Dashboard</button>
    </div>
  </div>`;
}

const COACH_START = new Date('2026-07-05');
const COACH_EXAM  = new Date('2026-07-28');
COACH_START.setHours(0,0,0,0);
COACH_EXAM.setHours(0,0,0,0);

function getCoachDay() {
  const today = new Date(); today.setHours(0,0,0,0);
  if (today < COACH_START) return 1;
  const d = Math.floor((today - COACH_START) / 86400000) + 1;
  return Math.max(1, Math.min(23, d));
}

function getDaysUntilExam() {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.max(0, Math.floor((COACH_EXAM - today) / 86400000));
}

function getTodayKey() {
  const today = new Date();
  return today.toISOString().slice(0,10); // YYYY-MM-DD
}

function loadCoachProgress() {
  try {
    const raw = localStorage.getItem('im4dbCoachProgress');
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveCoachProgress(data) {
  localStorage.setItem('im4dbCoachProgress', JSON.stringify(data));
}

function getTasksDoneForDay(dateKey) {
  const cp = loadCoachProgress();
  return cp[dateKey] || [];
}

function markTaskDone(taskIdx) {
  const key = getTodayKey();
  const cp = loadCoachProgress();
  if (!cp[key]) cp[key] = [];
  if (!cp[key][taskIdx]) cp[key][taskIdx] = true;
  saveCoachProgress(cp);
}

  const today = new Date(); today.setHours(0,0,0,0);

  // After exam day

    area.innerHTML = `<div class="coach-exam-banner">

    return;
  }

  const dayNum = getCoachDay();
  const daysUntil = getDaysUntilExam();
  const dateKey = getTodayKey();
  const plan = COACH_PLAN[dayNum];
  if (!plan) {
    area.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text2)">Plan not found for day ${dayNum}.</div>`;
    return;
  }

  const doneTasks = getTasksDoneForDay(dateKey);
  const totalTasks = plan.tasks.length;
  const doneCount = plan.tasks.filter((_,i) => doneTasks[i]).length;
  const allDone = doneCount === totalTasks;
  const overallPct = Math.round((dayNum - 1) / 23 * 100);

  // Missed days warning
  let missedHtml = '';
  if (dayNum > 1) {
    const cp = loadCoachProgress();
    let missedDays = 0;
    for (let d = 1; d < dayNum; d++) {
      const dk = new Date(COACH_START.getTime() + (d-1)*86400000).toISOString().slice(0,10);
      const dayPlan = COACH_PLAN[d];
      if (!dayPlan) continue;
      const done = cp[dk] || [];
      const dayTotal = dayPlan.tasks.length;
      const dayDone = dayPlan.tasks.filter((_,i) => done[i]).length;
      if (dayDone < dayTotal) missedDays++;
    }
    if (missedDays > 0) {
      missedHtml = `<div class="coach-caught-up">You're ${missedDays} day${missedDays>1?'s':''} behind — just keep going from today, you've got this!</div>`;

      const isNext = !isDone && plan.tasks.slice(0,i).every((_,j) => !!doneTasks[j]);
      return `<div class="coach-task ${isDone ? 'done' : isNext ? 'active-task' : ''}">
        <div class="coach-task-icon">${isDone ? '✓' : isNext ? '▶' : (i+1)}</div>

        ${isDone

    <div style="text-align:center;margin-top:8px;font-size:.78rem;color:var(--text2)">${doneCount}/${totalTasks} tasks done today</div>

function launchCoachTask(taskIdx) {
  const dayNum = getCoachDay();
  const plan = COACH_PLAN[dayNum];
  if (!plan) return;
  const task = plan.tasks[taskIdx];
  if (!task) return;

  coachPendingTask = { dayNum, taskIdx, task };

  if (task.type === 'theory') {
    // Show theory inline in coach area
    showCoachTheory(task.topicId, taskIdx);
    return;
  }

  if (task.type === 'flashcards') {
    showSection('flashcards');
    // Set topic filter to this topic
    setTimeout(() => {
      const sel = document.getElementById('fcTopicFilter');
      if (sel) {
        // Ensure options populated
        if (sel.children.length === 1) {
          TOPICS.forEach(tp => {
            const opt = document.createElement('option');
            opt.value = tp.id; opt.textContent = `T${tp.num}: ${tp.name}`;
            sel.appendChild(opt);
          });
        }
        sel.value = task.topicId;
        initFlashcards();
        renderTheory();
      }
      // Inject "Mark done & return" button
      injectCoachReturnBtn('flashcards', taskIdx, 'Finish Flashcards — Mark Done & Return to Plan');
    }, 50);
    return;
  }

  if (task.type === 'speed') {
    showSection('speedround');
    setTimeout(() => {
      // Pre-configure speed round
      const topicIds = task.topicIds || null;
      const count = task.count || 10;
      const weakMode = !!task.topicMode && task.topicMode === 'weak';
      startCoachSpeedRound(topicIds, count, weakMode, taskIdx);
    }, 50);
    return;
  }

  if (task.type === 'smart-review') {
    showSection('smartreview');
    setTimeout(() => {
      injectCoachReturnBtn('srArea', taskIdx, 'Mark Smart Review Done & Return to Plan', true);
    }, 100);
    return;
  }

  if (task.type === 'exam') {
    showSection('exam');
    setTimeout(() => {
      injectCoachReturnBtn('examSetupArea', taskIdx, 'Mark Exam Done & Return to Plan', true);
    }, 50);
    return;
  }
}

function showCoachTheory(topicId, taskIdx) {
  const tp = TOPICS.find(t => t.id === topicId);
  if (!tp) return;
  const area = document.getElementById('coachArea');
  const dayNum = getCoachDay();
  const daysUntil = getDaysUntilExam();
  const plan = COACH_PLAN[dayNum];

  area.innerHTML = `
    <button class="coach-back-btn" onclick="renderCoach()">← Back to Today's Plan</button>
    <div class="theory-panel">
      <h4>T${tp.num}: ${tp.name} — Cheat Sheet</h4>
      <ul>${tp.theory.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button onclick="markCoachTaskDone(${taskIdx})" style="background:var(--green);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer">
        I've read it — Mark Done ✓
      </button>
    </div>
  `;
}

function injectCoachReturnBtn(containerId, taskIdx, label, prepend) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const btn = document.createElement('div');
  btn.style.cssText = 'text-align:center;margin:16px 0';
  btn.innerHTML = `<button onclick="markCoachTaskDone(${taskIdx})" style="background:var(--green);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer">
    ${label} ✓
  </button>`;
  if (prepend) container.prepend(btn);
  else container.appendChild(btn);
}

function startCoachSpeedRound(topicIds, count, weakMode, taskIdx) {
  let pool;
  if (topicIds && topicIds.length > 0) {
    pool = CARDS
      .map((c,i) => ({...c, idx:i, srs:getSRSCard(i)}))
      .filter(c => topicIds.includes(c.t));
  } else {
    const due = getDueCards();
    pool = due.length > 0 ? due : CARDS.map((c,i) => ({...c,idx:i,srs:getSRSCard(i)}));
  }
  if (weakMode) {
    pool.sort((a,b) => {
      const rank = r => r === 'missed' ? 0 : r === 'partial' ? 1 : r === 'got' ? 2 : 3;
      return rank(progress[a.idx]) - rank(progress[b.idx]);
    });
  } else {
    pool = pool.sort(() => Math.random() - 0.5);
  }
  speedCards = pool.slice(0, Math.min(count === 9999 ? pool.length : count, pool.length));
  speedIdx = 0; speedStreak = 0; speedMaxStreak = 0; speedResults = []; speedCardTimes = [];
  renderSpeedCard();

  // After speed card renders, inject "done" button at the results stage
  // We intercept renderSpeedResults via coachPendingTask
}

function markCoachTaskDone(taskIdx) {
  markTaskDone(taskIdx);
  coachPendingTask = null;
  showSection('coach');
}

// Override renderSpeedResults to inject coach return if active
const _origRenderSpeedResults = renderSpeedResults;
renderSpeedResults = function() {
  _origRenderSpeedResults();
  if (coachPendingTask !== null) {
    const ti = coachPendingTask.taskIdx;
    setTimeout(() => injectCoachReturnBtn('speedArea', ti, 'Mark Speed Round Done & Return to Plan', false), 10);
  }
};

// Override submitExam to inject coach return if active
const _origSubmitExam = submitExam;
submitExam = function() {
  _origSubmitExam();
  if (coachPendingTask !== null) {
    const ti = coachPendingTask.taskIdx;
    setTimeout(() => {
      const modal = document.getElementById('resultsModal');
      if (modal && !modal.classList.contains('hidden')) {
        const btns = modal.querySelector('.results-btns');
        if (btns) {
          const btn = document.createElement('button');
          btn.className = 'primary';
          btn.style.background = 'var(--green)';
          btn.textContent = 'Mark Done & Return to Plan ✓';
          btn.onclick = () => { modal.classList.add('hidden'); markCoachTaskDone(ti); };
          btns.prepend(btn);
        }
      }
    }, 50);
  }
};

// Convenience alias used by coach task buttons
function showCoach() { showSection('coach'); }

// Called when a study activity completes; auto-marks the pending coach task done
function onActivityComplete() {
  if (coachPendingTask !== null) {
    markCoachTaskDone(coachPendingTask.taskIdx);
  }
}

// ============================================================
// INIT
// ============================================================
loadProgress();
loadSRS();
renderCoach();
</script>
